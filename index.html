
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zählerstand" />
  <meta name="description" content="Zählerstand Manager – Erfassen und verwalten Sie Ihre Zählerstände einfach und offline." />
  <link rel="manifest" href="./manifest.json" />
  <title>Zählerstand Manager</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Header -->
    <header class="header" id="header">
      <div class="header-inner">
        <button class="header-back" id="header-back" aria-label="Zurück" style="display:none;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h1 class="header-title" id="header-title">Übersicht</h1>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="main-content"></main>

    <!-- Install Banner -->
    <div class="install-banner" id="install-banner" style="display:none;">
      <div class="install-banner-content">
        <div class="install-banner-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <div class="install-banner-text">
          <strong>App installieren</strong>
          <span>Zum Startbildschirm hinzufügen für Offline-Nutzung</span>
        </div>
      </div>
      <div class="install-banner-actions">
        <button class="install-dismiss" id="install-dismiss">Später</button>
        <button class="install-accept" id="install-accept">Installieren</button>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-item active" data-view="dashboard">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span class="bottom-nav-label">Übersicht</span>
      </button>
      <button class="bottom-nav-item" data-view="meters">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span class="bottom-nav-label">Zähler</span>
      </button>
      <button class="bottom-nav-item" data-view="readings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="bottom-nav-label">Ablesungen</span>
      </button>
      <button class="bottom-nav-item" data-view="export">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="bottom-nav-label">Backup</span>
      </button>
    </nav>

    <!-- Confirm Dialog -->
    <div class="dialog-overlay" id="dialog-overlay" style="display:none;">
      <div class="dialog" onclick="event.stopPropagation()">
        <h3 class="dialog-title" id="dialog-title"></h3>
        <p class="dialog-message" id="dialog-message"></p>
        <div class="dialog-actions">
          <button class="dialog-btn dialog-btn-cancel" id="dialog-cancel">Abbrechen</button>
          <button class="dialog-btn dialog-btn-danger" id="dialog-confirm">Löschen</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/icons.js"></script>
  <script src="./js/views.js"></script>
  <script src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          console.log('SW registered:', reg.scope);
        }).catch(function(err) {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
